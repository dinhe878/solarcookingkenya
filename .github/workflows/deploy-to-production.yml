name: 🚀 Deploy website on merged PR to main

on:
  pull_request:
    types:
      - closed # when merged PR is closed
    branches:
      - main   # only PRs targeting main

jobs:
  web-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get latest code
        uses: actions/checkout@v4

      # If you have a build step (npm run build, etc.), add it here.
      - name: Build
        run: npm ci && npm run build

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /domains/solarcookingkenya.co.ke/public_html/
          local-dir: ./out/